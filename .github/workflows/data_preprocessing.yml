name: Data Preprocessing Automation

# Trigger: Workflow akan berjalan setiap kali ada 'push' ke branch main atau dijalankan manual
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout isi repositori agar bisa diakses oleh runner GitHub
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Mengatur environment Python di server GitHub
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. Menginstal library yang dibutuhkan agar skrip otomasi tidak error
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn

    # 4. Menjalankan skrip otomasi preprocessing yang sudah kamu buat
    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_Mohammad-Aqil-Athallah.py

    # 5. Mengembalikan & menyimpan dataset bersih terbaru ke repositori (Syarat Advance)
    - name: Commit and Push Cleaned Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add preprocessing/namadataset_preprocessing/predictive_maintenance_clean.csv
        git diff --staged --quiet || (git commit -m "Automated data preprocessing update [skip ci]" && git push)